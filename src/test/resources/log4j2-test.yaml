Configuration:
  status: INFO
  Properties:
    Property:
      - name: "DefaultPattern"
        value: "%d{yyyy-MM-dd HH:mm:ss.SSS} %level [%t] [%c] - %msg%n"

  Appenders:
    Console:
      name: consoleAppender
      target: SYSTEM_OUT
      PatternLayout:
        pattern: "${DefaultPattern}"
    File:
      name: fileAppender
      fileName: "target/tests.log"
      PatternLayout:
        pattern: "${DefaultPattern}"

  Loggers:
    Logger:
      # Подавляем INFO сообщения от контейнера потоков WebDriver
      - name: com.codeborne.selenide.WebDriverThreadLocalContainer
        level: WARN
        additivity: false
        AppenderRef:
          - ref: consoleAppender
          - ref: fileAppender

      # Подавляем INFO сообщения от фабрики создания драйверов
      - name: com.codeborne.selenide.webdriver.WebDriverFactory
        level: WARN
        additivity: false
        AppenderRef:
          - ref: consoleAppender
          - ref: fileAppender

      # Общие настройки для остальных компонентов Selenide
      - name: com.codeborne.selenide
        level: INFO
        additivity: false
        AppenderRef:
          - ref: consoleAppender
          - ref: fileAppender

      - name: org.openqa.selenium
        level: INFO
        additivity: false
        AppenderRef:
          - ref: consoleAppender
          - ref: fileAppender

    Root:
      level: INFO
      AppenderRef:
        - ref: consoleAppender
        - ref: fileAppender